name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check static frontend files
        run: |
          test -f index.html
          test -f src/styles.css
          grep -q "src/styles.css" index.html
